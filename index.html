<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生活系统（手机版）</title>

<style>
body { font-family: Arial; padding:15px; }

button {
  padding:10px;
  margin:5px;
  font-size:14px;
  border-radius:8px;
  border:none;
}

.work { background:#4CAF50; color:white; }
.fun { background:#2196F3; color:white; }
.sleep { background:#9C27B0; color:white; }

.bar {
  display:flex;
  height:24px;
  margin:5px 0;
}

.cell {
  flex:1;
  border:1px solid #ddd;
}

.day { margin-bottom:10px; }

.today { outline:2px solid red; }
</style>
</head>

<body>

<h3>📱 生活系统</h3>

<div>
  <button class="work" onclick="setType('work')">工作</button>
  <button class="fun" onclick="setType('fun')">娱乐</button>
  <button class="sleep" onclick="setType('sleep')">睡觉</button>
</div>

<div>
  <button onclick="add()">➕添加时间段</button>
  <button onclick="toggleView()">📅切换视图</button>
</div>

<div id="container"></div>

<script>
let data=JSON.parse(localStorage.getItem("timelineData")||"{}");

let today=new Date();
let todayKey=today.toISOString().slice(0,10);

let type="work";
let showMonth=false;

function setType(t){ type=t; }

function add(){
  let s=parseInt(prompt("开始时间"));
  let e=parseInt(prompt("结束时间"));

  if(!data[todayKey]) data[todayKey]=Array(24).fill("");

  for(let i=s;i<e;i++){
    data[todayKey][i]=type;
  }

  save();render();
}

function toggleView(){
  showMonth=!showMonth;
  render();
}

function save(){
  localStorage.setItem("timelineData",JSON.stringify(data));
}

function render(){
  container.innerHTML="";

  let days=showMonth?30:1;

  for(let i=0;i<days;i++){
    let d=new Date();
    d.setDate(today.getDate()+i);

    let key=d.toISOString().slice(0,10);
    let label=(d.getMonth()+1)+"月"+d.getDate()+"日";

    if(!data[key]) data[key]=Array(24).fill("");

    let div=document.createElement("div");
    div.className="day";

    if(key===todayKey) div.classList.add("today");

    let title=document.createElement("div");
    title.innerText=label;

    let bar=document.createElement("div");
    bar.className="bar";

    data[key].forEach(v=>{
      let c=document.createElement("div");
      c.className="cell "+v;
      bar.appendChild(c);
    });

    div.appendChild(title);
    div.appendChild(bar);
    container.appendChild(div);
  }
}

render();
</script>

</body>
</html>
