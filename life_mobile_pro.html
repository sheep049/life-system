<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生活系统（手机版）</title>

<style>
body {
  font-family: Arial;
  padding:15px;
}

h2 {
  margin-bottom:10px;
}

/* 按钮 */
button {
  padding:12px;
  margin:5px;
  font-size:16px;
  border:none;
  border-radius:8px;
}

/* 类型按钮 */
.type-btn { width:30%; }
.work { background:#4CAF50; color:white; }
.fun { background:#2196F3; color:white; }
.sleep { background:#9C27B0; color:white; }

/* 时间轴 */
.bar {
  display:flex;
  height:28px;
  margin-top:10px;
}

.cell {
  flex:1;
  border:1px solid #ddd;
}

/* 当前状态 */
.selected {
  outline:3px solid orange;
}

/* 时间选择 */
.time-grid {
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap:5px;
  margin-top:10px;
}

.time-btn {
  padding:10px;
  background:#eee;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>📱 今日记录</h2>

<!-- 类型 -->
<div>
  <button class="type-btn work" onclick="setType('work')">工作</button>
  <button class="type-btn fun" onclick="setType('fun')">娱乐</button>
  <button class="type-btn sleep" onclick="setType('sleep')">睡觉</button>
</div>

<!-- 添加 -->
<div>
  <button onclick="startPick()">➕ 添加时间段</button>
</div>

<!-- 时间选择 -->
<div id="timePicker" style="display:none;">
  <p>选择开始时间</p>
  <div class="time-grid" id="startGrid"></div>

  <p>选择结束时间</p>
  <div class="time-grid" id="endGrid"></div>
</div>

<!-- 时间轴 -->
<div id="bar" class="bar"></div>

<script>
let data=JSON.parse(localStorage.getItem("timelineData")||"{}");

let today=new Date().toISOString().slice(0,10);

if(!data[today]) data[today]=Array(24).fill("");

let type="work";
let startTime=null;

function setType(t){ type=t; }

function startPick(){
  document.getElementById("timePicker").style.display="block";
}

function createTimeGrid(){
  let startGrid=document.getElementById("startGrid");
  let endGrid=document.getElementById("endGrid");

  for(let i=0;i<24;i++){
    let b1=document.createElement("div");
    b1.className="time-btn";
    b1.innerText=i;

    b1.onclick=()=>{
      startTime=i;
      alert("开始："+i+"点");
    };

    let b2=document.createElement("div");
    b2.className="time-btn";
    b2.innerText=i;

    b2.onclick=()=>{
      if(startTime===null){
        alert("先选开始时间");
        return;
      }

      for(let h=startTime;h<i;h++){
        data[today][h]=type;
      }

      save();
      render();
      document.getElementById("timePicker").style.display="none";
      startTime=null;
    };

    startGrid.appendChild(b1);
    endGrid.appendChild(b2);
  }
}

function save(){
  localStorage.setItem("timelineData",JSON.stringify(data));
}

function render(){
  let bar=document.getElementById("bar");
  bar.innerHTML="";

  data[today].forEach(v=>{
    let c=document.createElement("div");
    c.className="cell "+v;
    bar.appendChild(c);
  });
}

createTimeGrid();
render();
</script>

</body>
</html>
